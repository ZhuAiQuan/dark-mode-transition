<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dark-mode-transition demo</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        /* 主题样式由业务自己写，库只负责 html.dark 开关 */
        :root {
            --bg: #f5f5f5;
            --text: #1a1a1a;
            --btn-bg: #1a1a1a;
            --btn-text: #fff;
        }

        html.dark {
            --bg: #1a1a1a;
            --text: #f5f5f5;
            --btn-bg: #f5f5f5;
            --btn-text: #1a1a1a;
        }

        body {
            font-family: system-ui, sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100dvh;
            display: grid;
            place-items: center;
            gap: 16px;
        }

        .status {
            font-size: 14px;
            opacity: 0.7;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: pointer;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>

<body>
    <p class="status" id="status"></p>
    <div class="row">
        <button type="button" class="toggle-btn">toggle</button>
        <button type="button" data-mode="light">light</button>
        <button type="button" data-mode="dark">dark</button>
        <button type="button" data-mode="system">system</button>
    </div>
    <script type="module">
        import { DarkModeTransition } from '../index.ts'

        const statusEl = document.getElementById('status')
        const mode = new DarkModeTransition({
            storageKey: 'demo-theme',
            onChange(m, resolved) {
                statusEl.textContent = `mode: ${m} · resolved: ${resolved}`
            },
        })

        document.querySelector('.toggle-btn').addEventListener('click', (e) => {
            mode.toggle(e)
        })

        document.querySelectorAll('[data-mode]').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                mode.setMode(btn.dataset.mode, e)
            })
        })
    </script>
</body>

</html>
